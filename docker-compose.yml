services:

  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    privileged: true
    user: root
    ports:
      - "9090:8080"
      - "50000:50000"
    volumes:
      - jenkins-data:/var/jenkins_home
      - //var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - devops-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_URL: ${APP_URL:-http://localhost:3000}
    image: devops-hero:latest
    container_name: devops-hero-app
    ports:
      - "8081:80"
    restart: unless-stopped
    networks:
      - devops-network

volumes:
  jenkins-data:

networks:
  devops-network:
    driver: bridge
